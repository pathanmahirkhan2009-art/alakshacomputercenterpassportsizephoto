<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>અલ-અક્સા પાસપોર્ટ પ્રો - સુપરફાસ્ટ મેકર</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        /* --- PRO Tier 10 Themes & Variables --- */
        :root {
            --bg-body: #f4f7fa; --bg-card: rgba(255, 255, 255, 0.95); --text-primary: #1a1a1a; --text-secondary: #555555;
            --primary-gradient: linear-gradient(135deg, #004085 0%, #0056b3 100%);
            --accent: #ffc107; --border-color: #eaeaea; --shadow-card: 0 10px 20px rgba(0,0,0,0.05);
            --primary-solid: #004085;
        }
        [data-theme="dark"] {
            --bg-body: #121212; --bg-card: rgba(30, 30, 30, 0.95); --text-primary: #f1f1f1; --text-secondary: #aaaaaa;
            --primary-gradient: linear-gradient(135deg, #333333 0%, #1a1a1a 100%);
            --accent: #bb86fc; --border-color: #333333; --shadow-card: 0 10px 20px rgba(0,0,0,0.3);
            --primary-solid: #333333;
        }
        [data-theme="navy"] {
            --bg-body: #001f3f; --bg-card: rgba(0, 31, 63, 0.9); --text-primary: #f0f0f0; --text-secondary: #c0c0c0;
            --primary-gradient: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            --accent: #ffb300; --border-color: #003366; --shadow-card: 0 10px 20px rgba(0,0,0,0.2);
            --primary-solid: #001f3f;
        }
        [data-theme="forest"] {
            --bg-body: #002b11; --bg-card: rgba(0, 43, 17, 0.9); --text-primary: #e0f0e0; --text-secondary: #a0c0a0;
            --primary-gradient: linear-gradient(135deg, #002b11 0%, #1b5e20 100%);
            --accent: #ffeb3b; --border-color: #1b5e20; --shadow-card: 0 10px 20px rgba(0,0,0,0.2);
            --primary-solid: #002b11;
        }
        [data-theme="crimson"] {
            --bg-body: #410000; --bg-card: rgba(65, 0, 0, 0.9); --text-primary: #f0e0e0; --text-secondary: #c0a0a0;
            --primary-gradient: linear-gradient(135deg, #410000 0%, #881c1c 100%);
            --accent: #ffeb3b; --border-color: #881c1c; --shadow-card: 0 10px 20px rgba(0,0,0,0.2);
            --primary-solid: #410000;
        }

        body {
            font-family: 'Baloo Bhai 2', cursive; font-weight: 700;
            background-color: var(--bg-body); color: var(--text-primary); margin: 0; padding: 0; transition: 0.4s ease;
        }

        /* --- Header & Fixed Animation --- */
        .header {
            background-image: var(--primary-gradient); color: white; text-align: center; padding: 35px 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        /* Trick to fix cursor flying away: Ghost Text */
        .typing-container {
            position: relative; display: inline-block;
        }
        .ghost-text {
            font-size: 46px; /* Big Heading */
            font-weight: 800; visibility: hidden; /* Takes up exact width */
        }
        .typing-text {
            position: absolute; top: 0; left: 0; margin: 0;
            font-size: 46px; /* Big Heading */
            color: var(--accent); font-weight: 800; 
            white-space: nowrap; overflow: hidden; border-right: 4px solid var(--accent);
            width: 100%;
            animation: typing 3.5s steps(26) infinite alternate, blink .75s step-end infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }
        @keyframes typing { 0% { width: 0 } 100% { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }
        
        .header p { margin: 5px 0 0 0; font-size: 20px; font-weight: 600; }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: var(--bg-card); border-bottom: 2px solid var(--border-color); }
        .top-bar select { font-family: 'Baloo Bhai 2', cursive; font-weight: 700; padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; }

        /* Layout */
        .dashboard-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; align-items: start; }
        @media (max-width: 1000px) { .dashboard-container { grid-template-columns: 1fr; } }
        
        .panel-card { background-color: var(--bg-card); padding: 30px; border-radius: 18px; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .section-title { font-size: 22px; color: var(--primary-solid); border-bottom: 3px solid var(--accent); padding-bottom: 8px; margin-bottom: 20px; margin-top: 0; display: flex; gap: 10px; }
        
        /* Inputs & Buttons */
        label { display: block; margin-bottom: 7px; font-size: 16px; color: var(--text-primary); }
        input[type="file"], input[type="color"], input[type="range"] { width: 100%; margin-bottom: 18px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-body); cursor: pointer; }
        
        button { font-family: 'Baloo Bhai 2', cursive; font-weight: 800; border: none; padding: 14px; margin: 8px 0; font-size: 17px; cursor: pointer; border-radius: 10px; width: 100%; transition: 0.3s; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        button:active { transform: scale(0.98); }
        
        .btn-accent { background-color: var(--accent); color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
        .btn-danger { background-color: #d9534f; }
        .btn-magic { background: linear-gradient(45deg, #ff007f, #7928ca); box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); margin-bottom: 20px; }
        .btn-success { background-color: #28a745; font-size: 18px; }

        .slider-group { margin-bottom: 15px; }
        .slider-val { font-size: 16px; color: var(--primary-solid); font-weight: 800; }

        /* Images */
        #cropSection { display: none; margin-top: 15px; }
        .crop-image-wrapper { width: 100%; max-height: 350px; overflow: hidden; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; background: #eee;}
        #previewImage { width: 160px; height: 210px; object-fit: cover; border: 1px solid var(--border-color); border-radius: 8px; display: block; margin: 20px auto; box-shadow: 0 8px 20px rgba(0,0,0,0.12); }

        /* Overlay */
        #statusOverlay { display: none; background-color: rgba(0,0,0,0.8); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1001; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 22px; }
        .loader-spin { border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Print Modal */
        #printPreviewModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-box { background: white; padding: 30px; border-radius: 18px; text-align: center; }
        
        .paper-4x6-layout {
            width: 6in; height: 4in; background: white; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); 
            gap: 0.08in; padding: 0.12in; box-sizing: border-box; border: 2px dashed #000;
        }
        .paper-4x6-layout img { width: 100%; height: 100%; object-fit: cover; box-sizing: border-box; }

        /* ========================================================
           STRICT PRINT CSS - FIX FOR 6 BLANK PAGES
           ======================================================== */
        @media print {
            @page { size: 6in 4in landscape; margin: 0; }
            
            /* 1. Limit the entire document to exactly 1 page size */
            html, body { 
                margin: 0 !important; padding: 0 !important; 
                width: 6in !important; height: 4in !important; 
                overflow: hidden !important; background: white !important; 
            }
            
            /* 2. Hide everything by default */
            body > * { display: none !important; }
            
            /* 3. Show ONLY the modal wrapper and reset its position */
            #printPreviewModal { 
                display: block !important; position: absolute !important; 
                top: 0 !important; left: 0 !important; 
                width: 6in !important; height: 4in !important; 
                background: none !important; padding: 0 !important; margin: 0 !important; 
            }
            
            /* 4. Strip modal box styles so it acts as an invisible wrapper */
            .modal-box { 
                padding: 0 !important; margin: 0 !important; border: none !important; 
                box-shadow: none !important; background: transparent !important; 
                width: 100% !important; height: 100% !important; 
            }
            
            /* 5. Hide modal text and buttons */
            .modal-box h2, .modal-box div[style*="flex"] { display: none !important; }
            
            /* 6. Exact positioning for the photo grid */
            .paper-4x6-layout { 
                position: absolute !important; top: 0 !important; left: 0 !important; 
                border: none !important; margin: 0 !important; 
                width: 6in !important; height: 4in !important; 
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; 
            }
        }
    </style>
</head>
<body data-theme="light">

<div class="header">
    <div class="typing-container">
        <span class="ghost-text">અલ-અક્સા કોમ્પ્યુટર સેન્ટર</span>
        <h1 class="typing-text">અલ-અક્સા કોમ્પ્યુટર સેન્ટર</h1>
    </div>
    <p>ધુણાદરા, ગુજરાત 388230 | મો. 9638730186</p>
</div>

<div class="top-bar panel-card">
    <div style="display: flex; align-items: center; gap: 10px;">
        <label style="margin:0;">🎨 થીમ બદલો:</label>
        <select id="themeSelect">
            <option value="light">ડિફોલ્ટ (Light)</option>
            <option value="dark">ડાર્ક મોડ (Dark)</option>
            <option value="navy">નેવી બ્લુ (Navy)</option>
            <option value="forest">લીલો (Forest)</option>
            <option value="crimson">લાલ (Crimson)</option>
        </select>
    </div>
</div>

<div class="dashboard-container">
    <div class="panel-card">
        <div class="section-title"><span style="color:var(--accent)">૧.</span> ફોટો ક્રોપિંગ</div>
        <input type="file" id="fileInput" accept="image/*">
        
        <div id="cropSection">
            <div class="crop-image-wrapper">
                <img id="cropImg" src="" style="max-width: 100%;">
            </div>
            <button class="btn-accent" id="doCrop">✅ ક્રોપ ફાઇનલ કરો (OK)</button>
        </div>
    </div>

    <div class="panel-card">
        <div class="section-title"><span style="color:var(--accent)">૨.</span> AI એડિટિંગ & કલર</div>
        
        <button class="btn-danger" id="doRemoveBg">🪄 ફાસ્ટ Background કાઢો (Free)</button>
        
        <label>પાછળનો કલર (Background Color):</label>
        <input type="color" id="pickColor" value="#ffffff">

        <button class="btn-magic" id="autoEnhance">✨ ઓટો એન્હાન્સ (Magic)</button>

        <div class="slider-group">
            <label>બોર્ડર (Outline): <span id="borderRVal" class="slider-val">2</span>px</label>
            <input type="range" id="borderR" min="0" max="10" value="2">
        </div>
        <div class="slider-group">
            <label>બ્રાઇટનેસ (Brightness): <span id="brightVal" class="slider-val">100</span>%</label>
            <input type="range" id="bright" min="50" max="150" value="100">
        </div>
        <div class="slider-group">
            <label>કોન્ટ્રાસ્ટ (Contrast): <span id="contVal" class="slider-val">100</span>%</label>
            <input type="range" id="contrast" min="50" max="150" value="100">
        </div>
        <div class="slider-group">
            <label>કલર (Saturation): <span id="satVal" class="slider-val">100</span>%</label>
            <input type="range" id="saturation" min="0" max="200" value="100">
        </div>
    </div>

    <div class="panel-card" style="text-align: center;">
        <div class="section-title"><span style="color:var(--accent)">૩.</span> પ્રિન્ટ આઉટપુટ</div>
        <img id="previewImage" src="https://via.placeholder.com/160x210?text=Select+Photo">
        <button class="btn-success" id="openPreview">👀 પ્રિન્ટ પ્રિવ્યુ જુઓ</button>
    </div>
</div>

<div id="printPreviewModal">
    <div class="modal-box">
        <h2 style="color:#333; margin-top:0;">4x6 પેપર પ્રિવ્યુ (8 ફોટા)</h2>
        <div id="printArea" class="paper-4x6-layout"></div>
        <div style="display:flex; gap:15px; margin-top:25px; justify-content: center;">
            <button class="btn-danger" style="width: 150px;" onclick="document.getElementById('printPreviewModal').style.display='none'">❌ કેન્સલ</button>
            <button class="btn-success" style="width: 150px;" onclick="window.print()">🖨️ પ્રિન્ટ કાઢો</button>
        </div>
    </div>
</div>

<div id="statusOverlay">
    <div class="loader-spin"></div>
    <span id="loadingText">⏳ AI મોડલ સેટ થઈ રહ્યું છે (ફક્ત પહેલી વાર)...</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    // --- Google MediaPipe Initialization (Lightweight & Superfast) ---
    const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
    }});
    selfieSegmentation.setOptions({ modelSelection: 1 }); // 1 = Faster Landscape Model
    
    // Process Background Removal Result
    selfieSegmentation.onResults((results) => {
        const canvas = document.createElement('canvas');
        canvas.width = results.image.width;
        canvas.height = results.image.height;
        const ctx = canvas.getContext('2d');

        ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-in';
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        currentImg = canvas.toDataURL('image/png');
        previewImage.src = currentImg;

        document.getElementById('statusOverlay').style.display = "none";
        previewImgStyles(1);
    });

    let cropper;
    let currentImg = "";
    const fileInput = document.getElementById('fileInput');
    const previewImage = document.getElementById('previewImage');
    const cropSection = document.getElementById('cropSection');

    // Theme Switcher
    document.getElementById('themeSelect').onchange = (e) => document.body.setAttribute('data-theme', e.target.value);

    // Live Slider Updates
    const updateSlidVals = () => {
        document.getElementById('borderRVal').innerText = document.getElementById('borderR').value;
        document.getElementById('brightVal').innerText = document.getElementById('bright').value;
        document.getElementById('contVal').innerText = document.getElementById('contrast').value;
        document.getElementById('satVal').innerText = document.getElementById('saturation').value;
    };
    
    ['borderR', 'bright', 'contrast', 'saturation'].forEach(id => {
        document.getElementById(id).oninput = () => { updateSlidVals(); updateStyles(); };
    });
    document.getElementById('pickColor').oninput = updateStyles;

    // Auto Enhance
    document.getElementById('autoEnhance').onclick = () => {
        document.getElementById('bright').value = 110;
        document.getElementById('contrast').value = 115;
        document.getElementById('saturation').value = 120;
        updateSlidVals(); updateStyles();
    };

    // Crop Image
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('cropImg').src = URL.createObjectURL(file);
            cropSection.style.display = "block"; 
            if (cropper) cropper.destroy();
            cropper = new Cropper(document.getElementById('cropImg'), { aspectRatio: 3.5 / 4.5, viewMode: 1 });
        }
    };

    document.getElementById('doCrop').onclick = () => {
        if(!cropper) return;
        currentImg = cropper.getCroppedCanvas({ width: 350, height: 450 }).toDataURL("image/png");
        previewImage.src = currentImg;
        cropSection.style.display = "none"; 
        updateStyles();
    };

    // Trigger MediaPipe Fast Background Removal
    document.getElementById('doRemoveBg').onclick = async () => {
        if (!currentImg) return alert("કૃપા કરીને પહેલા ફોટો અપલોડ કરી 'ક્રોપ ફાઇનલ કરો' બટન દબાવો.");
        
        document.getElementById('loadingText').innerText = "✨ સેકન્ડોમાં બેકગ્રાઉન્ડ દૂર થઈ રહ્યું છે...";
        document.getElementById('statusOverlay').style.display = "flex";
        previewImgStyles(0.4);

        const imgEl = new Image();
        imgEl.src = currentImg;
        imgEl.onload = async () => {
            await selfieSegmentation.send({image: imgEl});
        };
    };

    function updateStyles() {
        if (!currentImg) return;
        previewImage.style.backgroundColor = document.getElementById('pickColor').value;
        previewImage.style.border = `${document.getElementById('borderR').value}px solid black`;
        previewImgStyles(1);
    }
    
    function previewImgStyles(opacityVal) {
        if (!currentImg) return;
        const b = document.getElementById('bright').value;
        const c = document.getElementById('contrast').value;
        const s = document.getElementById('saturation').value;
        previewImage.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) opacity(${opacityVal})`;
    }

    // Modal Grid Generation
    document.getElementById('openPreview').onclick = () => {
        if (!currentImg) return alert("કૃપા કરીને પહેલા ફોટો તૈયાર કરો.");
        const area = document.getElementById('printArea');
        area.innerHTML = "";
        
        const b = document.getElementById('bright').value;
        const c = document.getElementById('contrast').value;
        const s = document.getElementById('saturation').value;

        for (let i = 0; i < 8; i++) {
            const img = document.createElement('img');
            img.src = currentImg;
            img.style.backgroundColor = document.getElementById('pickColor').value;
            img.style.border = `${document.getElementById('borderR').value}px solid black`;
            img.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
            area.appendChild(img);
        }
        document.getElementById('printPreviewModal').style.display = "flex";
    };
</script>
</body>
</html>
