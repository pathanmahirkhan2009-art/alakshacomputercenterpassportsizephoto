<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<title>AL-AKSHA COMPUTER STUDIO</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f0f0f0;
    --text: #000;
    --primary: black;
    --card: white;
}

body {
    font-family: 'Baloo Bhai 2', cursive;
    text-align: center;
    background: var(--bg);
    color: var(--text);
}

h1 {
    background: var(--primary);
    color: white;
    padding: 15px;
}

.controls {
    margin: 15px;
}

.print-area {
    width: 6in;
    height: 4in;
    background: var(--card);
    margin: auto;
    display: grid;
    grid-template-columns: repeat(4,1fr);
    grid-template-rows: repeat(2,1fr);
    gap: 5px;
    padding: 5px;
    border: 2px solid var(--primary);
}

.photo-box {
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: var(--primary);
    color: white;
    cursor: pointer;
    font-family: 'Baloo Bhai 2';
}

/* Theme Buttons */
.theme-btn {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
    margin: 3px;
}

/* Themes */
.red { --primary: #e74c3c; }
.blue { --primary: #3498db; }
.green { --primary: #27ae60; }
.purple { --primary: #8e44ad; }
.orange { --primary: #e67e22; }
.dark { --primary: #2c3e50; }
.pink { --primary: #ff4d6d; }
.teal { --primary: #1abc9c; }
.gold { --primary: #d4af37; }
.gray { --primary: #7f8c8d; }

/* Dark Mode */
.dark-mode {
    --bg: #121212;
    --text: #ffffff;
    --card: #1e1e1e;
}
</style>
</head>

<body>

<h1>AL-AKSHA COMPUTER STUDIO</h1>

<div class="controls">

<input type="file" id="upload"><br><br>

<!-- 🌙 Dark Mode -->
<button onclick="toggleDark()">🌙 ડાર્ક મોડ</button>

<br><br>

<!-- 🎨 Themes -->
<div>
<span class="theme-btn red" onclick="setTheme('red')"></span>
<span class="theme-btn blue" onclick="setTheme('blue')"></span>
<span class="theme-btn green" onclick="setTheme('green')"></span>
<span class="theme-btn purple" onclick="setTheme('purple')"></span>
<span class="theme-btn orange" onclick="setTheme('orange')"></span>
<span class="theme-btn dark" onclick="setTheme('dark')"></span>
<span class="theme-btn pink" onclick="setTheme('pink')"></span>
<span class="theme-btn teal" onclick="setTheme('teal')"></span>
<span class="theme-btn gold" onclick="setTheme('gold')"></span>
<span class="theme-btn gray" onclick="setTheme('gray')"></span>
</div>

<br>

<label>પૃષ્ઠભૂમિ:</label>
<button onclick="setBg('white')">સફેદ</button>
<button onclick="setBg('#87CEEB')">વાદળી</button>

<br><br>

<label>પ્રકાશ</label>
<input type="range" min="50" max="150" value="100" id="brightness">

<label>કોન્ટ્રાસ્ટ</label>
<input type="range" min="50" max="150" value="100" id="contrast">

<br><br>

<label>ઝૂમ</label>
<input type="range" min="1" max="2" step="0.1" value="1" id="zoom">

<br><br>

<label>બોર્ડર રંગ</label>
<input type="color" id="borderColor" value="#000000">

<label>બોર્ડર જાડાઈ</label>
<input type="range" id="borderSize" min="0" max="10" value="1">

<br><br>

<button onclick="downloadImage()">ડાઉનલોડ કરો</button>

</div>

<div id="printArea" class="print-area"></div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let currentImage = "";
let bgColor = "white";

const upload = document.getElementById("upload");
const printArea = document.getElementById("printArea");

upload.addEventListener("change", function() {
    const reader = new FileReader();
    reader.onload = function(e) {
        currentImage = e.target.result;
        generatePhotos();
    }
    reader.readAsDataURL(this.files[0]);
});

function generatePhotos() {
    printArea.innerHTML = "";

    for (let i = 0; i < 8; i++) {
        let div = document.createElement("div");
        div.className = "photo-box";
        div.style.background = bgColor;

        let img = document.createElement("img");
        img.src = currentImage;

        applyFilters(img);
        applyBorder(img);

        div.appendChild(img);
        printArea.appendChild(div);
    }
}

function applyFilters(img) {
    let b = brightness.value;
    let c = contrast.value;
    let z = zoom.value;

    img.style.filter = `brightness(${b}%) contrast(${c}%)`;
    img.style.transform = `scale(${z})`;
}

function applyBorder(img) {
    img.style.border = borderSize.value + "px solid " + borderColor.value;
}

document.querySelectorAll("input").forEach(i => {
    i.addEventListener("input", generatePhotos);
});

/* Background */
function setBg(color) {
    bgColor = color;
    generatePhotos();
}

/* Download */
function downloadImage() {
    html2canvas(printArea).then(canvas => {
        let link = document.createElement("a");
        link.download = "passport_4x6.jpg";
        link.href = canvas.toDataURL();
        link.click();
    });
}

/* 🌙 Dark Mode */
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

/* 🎨 Theme Change */
function setTheme(theme) {
    document.body.className = theme;
}
</script>

</body>
</html>
