<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>અલ-અક્સા પાસપોર્ટ પ્રો - અલ્ટ્રા ફિક્સ</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/browser.js"></script>

    <style>
        :root { --bg-body: #f4f7fa; --bg-card: rgba(255, 255, 255, 0.95); --text-primary: #1a1a1a; --text-secondary: #555555; --primary-gradient: linear-gradient(135deg, #004085 0%, #0056b3 100%); --accent: #ffc107; --border-color: #eaeaea; --shadow-card: 0 10px 20px rgba(0,0,0,0.05); --primary-solid: #004085; }
        [data-theme="dark"] { --bg-body: #121212; --bg-card: rgba(30, 30, 30, 0.95); --text-primary: #f1f1f1; --text-secondary: #aaaaaa; --primary-gradient: linear-gradient(135deg, #333333 0%, #1a1a1a 100%); --accent: #bb86fc; --border-color: #333333; --shadow-card: 0 10px 20px rgba(0,0,0,0.3); --primary-solid: #333333; }
        
        body { font-family: 'Baloo Bhai 2', cursive; font-weight: 700; background-color: var(--bg-body); color: var(--text-primary); margin: 0; padding: 0; transition: 0.4s ease; }
        * { box-sizing: border-box; }

        .header { background-image: var(--primary-gradient); color: white; text-align: center; padding: 25px 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .header h1 { 
            margin: 0; font-size: 32px; color: var(--accent); font-weight: 800; display: inline-block; overflow: hidden; white-space: nowrap; border-right: 4px solid var(--accent); width: 0; 
            animation: typing 8s steps(25, end) forwards, blink .75s step-end infinite; /* Animation Made Slow (8s) */
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--accent); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); }
        select { font-family: 'Baloo Bhai 2', cursive; font-weight: 700; padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; }

        .dashboard-container { max-width: 1250px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: start; }
        @media (max-width: 1000px) { .dashboard-container { grid-template-columns: 1fr; } }
        
        .panel-card { background-color: var(--bg-card); padding: 25px; border-radius: 15px; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .section-title { font-size: 20px; color: var(--primary-solid); border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-bottom: 15px; margin-top: 0; }
        
        input[type="file"], input[type="color"], input[type="range"] { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-body); cursor: pointer;}
        
        button { font-family: 'Baloo Bhai 2', cursive; font-weight: 800; border: none; padding: 12px; margin: 5px 0; font-size: 16px; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; gap: 8px;}
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        
        .btn-accent { background-color: var(--accent); color: black; border: 2px solid orange; }
        .btn-danger { background-color: #d9534f; }
        .btn-primary { background-color: #007bff; }
        .btn-magic { background: linear-gradient(45deg, #ff007f, #7928ca); box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); }
        .btn-success { background-color: #28a745; font-size: 18px; }

        /* Camera & Crop Styling */
        #camBox { display: none; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 3px solid var(--primary-solid); background: #000; }
        video { width: 100%; height: auto; }
        .crop-container { display: none; width: 100%; background: #eee; padding: 10px; border-radius: 10px; border: 2px solid #ccc; margin-top: 10px;}
        #cropImg { max-width: 100%; display: block; }

        /* Preview Wrapper */
        .photo-wrapper { position: relative; width: 140px; height: 180px; margin: 10px auto; border: 2px solid black; background: white; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Status Overlay */
        #statusOverlay { display: none; background-color: rgba(0,0,0,0.85); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1001; justify-content: center; align-items: center; flex-direction: column; color: white; text-align: center; }
        .loader-spin { border: 5px solid #444; border-top: 5px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Print Grid */
        #printPreviewModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto;}
        .modal-box { background: white; padding: 20px; border-radius: 15px; text-align: center; }
        .paper-4x6-layout { width: 6in; height: 4in; background: white; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 0.08in; padding: 0.12in; box-sizing: border-box; }
        .paper-a4-layout { width: 210mm; height: 297mm; background: white; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 3mm; padding: 10mm; box-sizing: border-box; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; border: none; }
            .paper-4x6-layout, .paper-a4-layout { border: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
        
        .check-box-label { display: flex; align-items: center; gap: 8px; cursor: pointer; background: #f8f9fa; padding: 8px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 8px; }
    </style>
</head>
<body data-theme="light">

<svg width="0" height="0" style="position:absolute;z-index:-1;">
  <defs>
    <filter id="sharpen-filter">
      <feConvolveMatrix order="3 3" preserveAlpha="true" kernelMatrix="0 -1 0 -1 5 -1 0 -1 0"/>
    </filter>
  </defs>
</svg>

<div class="header">
    <h1>અલ-અક્સા કોમ્પ્યુટર સેન્ટર</h1>
    <p>ધુણાદરા, ગુજરાત | મો. 9638730186</p>
</div>

<div class="top-bar">
    <select id="themeSelect">
        <option value="light">લાઇટ મોડ (Light)</option>
        <option value="dark">ડાર્ક મોડ (Dark)</option>
    </select>
</div>

<div class="dashboard-container">
    <div class="panel-card">
        <div class="section-title">૧. ફોટો અને ક્રોપિંગ</div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn-primary" id="btnStartCam">📷 કેમેરા ચાલુ</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div id="camBox">
            <video id="webcamVideo" autoplay playsinline></video>
            <div style="display:flex;">
                <button class="btn-primary" id="btnSwitchCam" style="border-radius:0; background:#666;">🔄 કેમેરા બદલો</button>
                <button class="btn-danger" id="btnCapture" style="border-radius:0; flex:2;">📸 ફોટો પાડો</button>
            </div>
        </div>

        <div id="cropBox" class="crop-container">
            <h4 style="margin:0 0 10px 0; color:#333;">ક્રોપિંગ એરિયા:</h4>
            <div style="height: 300px; background:#fff;">
                <img id="cropImg" src="">
            </div>
            <button class="btn-accent" id="doCrop" style="margin-top:15px; font-size:18px;">✂️ પાસપોર્ટ સાઇઝ ક્રોપ કરો</button>
        </div>
    </div>

    <div class="panel-card">
        <div class="section-title">૨. AI એડિટિંગ & કલર</div>
        <button class="btn-danger" id="doRemoveBg">🪄 HD Background કાઢો (Free)</button>
        <label>પાછળનો કલર:</label>
        <input type="color" id="pickColor" value="#ffffff">
        <button class="btn-magic" id="autoEnhance">✨ ઓટો એન્હાન્સ (Magic)</button>

        <label class="check-box-label"><input type="checkbox" id="filterSharpen"> ✨ ઝાંખો ફોટો ક્લિયર કરો</label>
        <label class="check-box-label"><input type="checkbox" id="filterBW"> ⚫ બ્લેક એન્ડ વ્હાઇટ</label>

        <div class="slider-group">
            <label>બોર્ડર: <span id="borderRVal">2</span>px</label>
            <input type="range" id="borderR" min="0" max="10" value="2">
        </div>
        <div class="slider-group">
            <label>બ્રાઇટનેસ: <span id="brightVal">100</span>%</label>
            <input type="range" id="bright" min="50" max="150" value="100">
        </div>
        <div class="slider-group">
            <label>કોન્ટ્રાસ્ટ: <span id="contVal">100</span>%</label>
            <input type="range" id="contrast" min="50" max="150" value="100">
        </div>
    </div>

    <div class="panel-card" style="text-align: center;">
        <div class="section-title">૩. પ્રિન્ટ આઉટપુટ</div>
        <div class="photo-wrapper" id="previewWrapper">
            <img id="previewImage" src="https://via.placeholder.com/140x180?text=Wait...">
        </div>
        <select id="paperSizeSelect" style="width: 100%; margin: 15px 0;">
            <option value="4x6">4x6 ઇંચ પેપર (૮ ફોટા)</option>
            <option value="a4">A4 સાઇઝ પેપર (૩૦ ફોટા)</option>
        </select>
        <button class="btn-success" id="openPreview">👀 પ્રિન્ટ પ્રિવ્યુ જુઓ</button>
        <button class="btn-primary" id="btnDownload" style="background:#17a2b8; margin-top:10px;">⬇️ ફોટો ડાઉનલોડ</button>
    </div>
</div>

<div id="printPreviewModal">
    <div class="modal-box">
        <div id="printArea" class="paper-4x6-layout"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-danger" onclick="document.getElementById('printPreviewModal').style.display='none'">કેન્સલ</button>
            <button class="btn-success" onclick="window.print()">🖨️ પ્રિન્ટ કાઢો</button>
        </div>
    </div>
</div>

<div id="statusOverlay">
    <div class="loader-spin"></div>
    <span id="loadingText" style="margin-top:10px;">પ્રોસેસિંગ...</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script type="module">
    import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm';

    let cropper;
    let currentImg = "";
    let streamRef = null;
    let facingMode = "user"; // "user" or "environment"
    const previewImage = document.getElementById('previewImage');

    document.getElementById('themeSelect').onchange = (e) => document.body.setAttribute('data-theme', e.target.value);

    // --- Webcam Controls ---
    async function startCamera() {
        if(streamRef) { streamRef.getTracks().forEach(t => t.stop()); }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
            streamRef = stream;
            document.getElementById('webcamVideo').srcObject = stream;
            document.getElementById('camBox').style.display = 'block';
        } catch (err) { alert("કેમેરા એક્સેસ ભૂલ!"); }
    }

    document.getElementById('btnStartCam').onclick = startCamera;
    
    document.getElementById('btnSwitchCam').onclick = () => {
        facingMode = (facingMode === "user") ? "environment" : "user";
        startCamera();
    };

    document.getElementById('btnCapture').onclick = () => {
        const video = document.getElementById('webcamVideo');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        if(streamRef) streamRef.getTracks().forEach(t => t.stop());
        document.getElementById('camBox').style.display = 'none';
        initCropper(canvas.toDataURL('image/png'));
    };

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) initCropper(URL.createObjectURL(file));
    };

    function initCropper(src) {
        document.getElementById('cropImg').src = src;
        document.getElementById('cropBox').style.display = "block";
        if (cropper) cropper.destroy();
        cropper = new Cropper(document.getElementById('cropImg'), { aspectRatio: 3.5 / 4.5, viewMode: 1 });
    }

    document.getElementById('doCrop').onclick = () => {
        currentImg = cropper.getCroppedCanvas({ width: 350, height: 450 }).toDataURL("image/png");
        previewImage.src = currentImg;
        document.getElementById('cropBox').style.display = "none";
        updateStyles();
    };

    // --- BG Removal ---
    document.getElementById('doRemoveBg').onclick = async () => {
        if (!currentImg) return alert("પહેલા ફોટો ક્રોપ કરો!");
        document.getElementById('statusOverlay').style.display = "flex";
        try {
            const blob = await fetch(currentImg).then(r => r.blob());
            const config = { publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/" };
            const resBlob = await imglyRemoveBackground(blob, config);
            currentImg = URL.createObjectURL(resBlob);
            previewImage.src = currentImg;
        } catch (e) { alert("ભૂલ!"); } finally { document.getElementById('statusOverlay').style.display = "none"; updateStyles(); }
    };

    // --- Styles ---
    function updateStyles() {
        if (!currentImg) return;
        document.getElementById('borderRVal').innerText = document.getElementById('borderR').value;
        document.getElementById('brightVal').innerText = document.getElementById('bright').value;
        document.getElementById('contVal').innerText = document.getElementById('contrast').value;

        const b = document.getElementById('bright').value;
        const c = document.getElementById('contrast').value;
        const s = document.getElementById('saturation').value || 100;
        
        let filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
        if (document.getElementById('filterBW').checked) filter += " grayscale(100%)";
        if (document.getElementById('filterSharpen').checked) filter += " url(#sharpen-filter)";
        
        previewImage.style.filter = filter;
        document.getElementById('previewWrapper').style.backgroundColor = document.getElementById('pickColor').value;
        document.getElementById('previewWrapper').style.border = `${document.getElementById('borderR').value}px solid black`;
    }

    ['borderR', 'bright', 'contrast', 'pickColor', 'filterBW', 'filterSharpen'].forEach(id => {
        document.getElementById(id).oninput = updateStyles;
        document.getElementById(id).onchange = updateStyles;
    });

    document.getElementById('autoEnhance').onclick = () => {
        document.getElementById('bright').value = 110; 
        document.getElementById('contrast').value = 115;
        document.getElementById('filterSharpen').checked = true;
        updateStyles();
    };

    // --- Preview Modal ---
    document.getElementById('openPreview').onclick = () => {
        if (!currentImg) return alert("પહેલા ફોટો તૈયાર કરો!");
        const area = document.getElementById('printArea');
        area.innerHTML = "";
        const paper = document.getElementById('paperSizeSelect').value;
        area.className = (paper === '4x6') ? 'paper-4x6-layout' : 'paper-a4-layout';
        const count = (paper === '4x6') ? 8 : 30;

        for (let i = 0; i < count; i++) {
            const clone = document.getElementById('previewWrapper').cloneNode(true);
            clone.style.width = "100%"; clone.style.height = "100%"; clone.style.margin = "0";
            area.appendChild(clone);
        }
        document.getElementById('printPreviewModal').style.display = "flex";
    };

    // --- Download ---
    document.getElementById('btnDownload').onclick = () => {
        const link = document.createElement('a');
        link.download = "Al-Aksha_Passport.png";
        link.href = currentImg;
        link.click();
    };
</script>
</body>
</html>
