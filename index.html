<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>અલ-અક્સા કોમ્પ્યુટર - 4x6 પાસપોર્ટ મેકર</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #004085;
            --accent-gold: #ffc107;
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --text-color: #333333;
        }
        
        [data-theme="dark"] {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #f1f1f1;
            --primary-blue: #333;
            --accent-gold: #ffc107;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background 0.3s;
        }
        
        .header {
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--accent-gold);
        }
        
        .top-bar {
            text-align: right;
            padding: 10px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid #ddd;
        }
        .theme-select {
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
        }

        .main-container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .controls-panel {
            flex: 2;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
            min-width: 300px;
        }
        
        .preview-panel {
            flex: 1;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            font-size: 16px;
            color: var(--primary-blue);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 5px;
            margin-bottom: 15px;
            margin-top: 20px;
        }
        .section-title:first-child { margin-top: 0; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
        }
        input[type="range"], input[type="color"] {
            width: 100%;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        /* Cropper Area */
        .crop-container {
            display: none;
            width: 100%;
            max-height: 400px;
            margin-bottom: 15px;
        }
        
        /* Single Preview (Passport Ratio ~ 3.5x4.5) */
        #previewImage {
            width: 140px; 
            height: 180px;
            object-fit: cover;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: opacity 0.3s;
        }

        /* Loading UI */
        #loadingMsg {
            display: none;
            color: #155724;
            font-weight: bold;
            font-size: 13px;
            margin-top: 5px;
            padding: 10px;
            background: #d4edda;
            border-radius: 5px;
            text-align: center;
        }
        
        button {
            border: none;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-warning { background-color: var(--accent-gold); color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        .btn-primary { background-color: var(--primary-blue); color: white; font-size: 16px; padding: 12px;}
        .btn-primary:hover { background-color: #003366; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* -------------------------------------- */
        /* PRINT CSS - 4x6 LANDSCAPE PERFECT FIT  */
        /* -------------------------------------- */
        #printAreaContainer { display: none; }
        
        @media print {
            @page {
                size: 6in 4in; /* Landscape 4x6 */
                margin: 0;
            }
            body * { visibility: hidden; }
            #printAreaContainer, #printAreaContainer * { visibility: visible; }
            
            #printAreaContainer {
                display: flex;
                position: absolute;
                left: 0;
                top: 0;
                width: 6in;
                height: 4in;
                box-sizing: border-box;
                background: white;
            }
            
            .print-grid {
                display: grid;
                width: 100%;
                height: 100%;
                /* 4 Columns, 2 Rows */
                grid-template-columns: repeat(4, 1fr); 
                grid-template-rows: repeat(2, 1fr);    
                gap: 0.05in; /* Minimum space between photos for easier cutting */
                padding: 0.05in; /* Minimal padding from paper edge */
                box-sizing: border-box;
            }
            
            .print-grid img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                box-sizing: border-box;
                -webkit-print-color-adjust: exact !important; /* To print back color & border */
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>અલ-અક્સા કોમ્પ્યુટર - 4x6 પાસપોર્ટ મેકર</h1>
</div>

<div class="top-bar">
    <label style="display:inline; margin-right: 10px;">થોમ:</label>
    <select id="themeSelect" class="theme-select">
        <option value="light">ડિફોલ્ટ (Light)</option>
        <option value="dark">ડાર્ક મોડ (Dark)</option>
    </select>
</div>

<div class="main-container">
    
    <div class="controls-panel">
        
        <div class="section-title">1. ફોટો ક્રોપિંગ (Crop)</div>
        <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 10px;">
        
        <div class="crop-container" id="cropContainer">
            <img id="imageToCrop" src="" style="max-width: 100%;">
            <button class="btn-warning" id="cropDoneBtn" style="margin-top: 10px;">✂️ પાસપોર્ટ સાઇઝ ફાઇનલ કરો</button>
        </div>

        <div class="section-title">2. બેકગ્રાઉન્ડ મેનેજમેન્ટ (API)</div>
        <label>Remove.bg API Key નાખો:</label>
        <input type="text" id="apiKey" placeholder=" Paste API Key here">
        <button class="btn-danger" id="removeBgBtn">🪄 માત્ર 2 સેકન્ડમાં Background કાઢો</button>
        <div id="loadingMsg">⏳ પ્રોસેસિંગ ચાલુ છે, રાહ જુઓ...</div>
        
        <div style="margin-top: 15px;">
            <label>નવો Background કલર પસંદ કરો:</label>
            <input type="color" id="bgColor" value="#ffffff">
        </div>

        <div class="section-title">3. કલર અને બોર્ડર (Adjustments)</div>
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>બોર્ડર જાડાઈ: <span id="borderSizeVal">1</span>px</label>
                <input type="range" id="borderSize" min="0" max="5" value="1">
            </div>
            <div style="flex: 1;">
                <label>બોર્ડર કલર:</label>
                <input type="color" id="borderColor" value="#000000">
            </div>
        </div>

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Brightness: <span id="brightVal">100</span>%</label>
                <input type="range" id="brightness" min="60" max="150" value="100">
            </div>
            <div style="flex: 1;">
                <label>Contrast: <span id="contVal">100</span>%</label>
                <input type="range" id="contrast" min="60" max="150" value="100">
            </div>
        </div>
        
    </div>

    <div class="preview-panel">
        <div class="section-title">ફાઇનલ પ્રિવ્યુ</div>
        <img id="previewImage" src="https://via.placeholder.com/140x180?text=Select+Photo" alt="Preview">
        
        <div style="width: 100%; margin-top: 30px;">
            <button class="btn-primary" id="printBtn">🖨️ 4x6 પેપર પર પ્રિન્ટ કાઢો</button>
            <p style="font-size: 12px; color: #666; margin-top: 10px;">પ્રિન્ટર ના સેટિંગમાં <b>"Landscape"</b> અને <b>"4x6"</b> સિલેક્ટ કરવું.</p>
        </div>
    </div>

</div>

<div id="printAreaContainer">
    <div id="printArea" class="print-grid">
        </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    // --- Theme Control ---
    const themeSelect = document.getElementById('themeSelect');
    themeSelect.addEventListener('change', function() {
        document.body.setAttribute('data-theme', this.value);
    });

    // --- Core Elements ---
    const imgInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImage');
    const printArea = document.getElementById('printArea');
    const removeBgBtn = document.getElementById('removeBgBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    const bgColor = document.getElementById('bgColor');
    const brightness = document.getElementById('brightness');
    const contrast = document.getElementById('contrast');
    const borderSize = document.getElementById('borderSize');
    const borderColor = document.getElementById('borderColor');
    const cropContainer = document.getElementById('cropContainer');
    const imageToCrop = document.getElementById('imageToCrop');
    const cropDoneBtn = document.getElementById('cropDoneBtn');
    
    // Check local storage for API key
    window.onload = function() {
        const savedKey = localStorage.getItem('removeBgKey');
        if(savedKey) { document.getElementById('apiKey').value = savedKey; }
    }

    let cropper;
    let currentImageUrl = previewImg.src;
    let croppedBlob = null;

    // 1. File Upload & Crop Setup
    imgInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            imageToCrop.src = url;
            cropContainer.style.display = 'block'; 
            
            if (cropper) { cropper.destroy(); }
            
            // Passport Size Aspect Ratio (3.5 / 4.5)
            cropper = new Cropper(imageToCrop, {
                aspectRatio: 3.5 / 4.5,
                viewMode: 1,
            });
        }
    });

    // 2. Crop Action Done
    cropDoneBtn.addEventListener('click', function() {
        if (!cropper) return;
        
        // Get cropped canvas at a standard passport size resolution
        const canvas = cropper.getCroppedCanvas({
            width: 350, // Approx 3.5 cm in DPI
            height: 450, // Approx 4.5 cm in DPI
        });
        
        // Convert to Blob
        canvas.toBlob(function(blob) {
            croppedBlob = blob;
            currentImageUrl = URL.createObjectURL(blob);
            previewImg.src = currentImageUrl;
            
            // Hide cropper area
            cropContainer.style.display = 'none';
            resetFilters();
        }, 'image/jpeg');
    });

    // 3. Imgly Background Removal (No API Required!)
    removeBgBtn.addEventListener('click', async function() {
        const apiKey = document.getElementById('apiKey').value.trim();
        
        if (!apiKey) {
            alert("કૃપા કરીને ખાનામાં Remove.bg ની API Key નાખો!");
            return;
        }
        
        if (!croppedBlob && !imgInput.files[0]) {
            alert("કૃપા કરીને પહેલા ફોટો સિલેક્ટ કરી ક્રોપ કરો.");
            return;
        }

        // Save API key to local memory
        localStorage.setItem('removeBgKey', apiKey);

        try {
            // Disable button & show processing message
            removeBgBtn.disabled = true;
            loadingMsg.style.display = "block";
            previewImg.style.opacity = "0.5";

            // If photo has been cropped, use croppedBlob, else original file
            const fileToProcess = croppedBlob || imgInput.files[0];
            const formData = new FormData();
            formData.append('image_file', fileToProcess);
            formData.append('size', 'auto');

            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': apiKey, },
                body: formData
            });

            if (response.ok) {
                const resultBlob = await response.blob();
                croppedBlob = resultBlob; // Update blob state with new bg-less image
                currentImageUrl = URL.createObjectURL(resultBlob);
                previewImg.src = currentImageUrl;
            } else {
                alert("ભૂલ આવી! API Key ખોટી છે અથવા ફ્રી ક્રેડિટ પૂરી થઈ ગઈ છે.");
            }
        } catch (error) {
            console.error(error);
            alert("ટેક્નિકલ ખામી આવી છે. ઇન્ટરનેટ ચેક કરો.");
        } finally {
            loadingMsg.style.display = "none";
            removeBgBtn.disabled = false;
            previewImg.style.opacity = "1";
        }
    });

    // 4. Styles Apply (Real-time update)
    function applyStyles() {
        // Text Updates
        document.getElementById('brightVal').innerText = brightness.value;
        document.getElementById('contVal').innerText = contrast.value;
        document.getElementById('borderSizeVal').innerText = borderSize.value;

        // Preview Apply
        previewImg.style.filter = `brightness(${brightness.value}%) contrast(${contrast.value}%)`;
        previewImg.style.backgroundColor = bgColor.value; // Background Color Apply
        previewImg.style.border = `${borderSize.value}px solid ${borderColor.value}`; // Outline Apply
    }

    brightness.addEventListener('input', applyStyles);
    contrast.addEventListener('input', applyStyles);
    bgColor.addEventListener('input', applyStyles);
    borderSize.addEventListener('input', applyStyles);
    borderColor.addEventListener('input', applyStyles);

    function resetFilters() {
        brightness.value = 100;
        contrast.value = 100;
        borderSize.value = 1;
        borderColor.value = "#000000";
        bgColor.value = "#ffffff";
        applyStyles();
    }

    // 5. Generate 8 Photos and Print
    document.getElementById('printBtn').addEventListener('click', function() {
        if(currentImageUrl.includes("placeholder")) {
            alert("પ્રિન્ટ કાઢવા માટે પહેલા ફોટો ક્રોપ કરો!");
            return;
        }
        
        printArea.innerHTML = ''; // Clear old photos
        
        // Generate 8 photos in perfect landscape grid
        for (let i = 0; i < 8; i++) {
            const img = document.createElement('img');
            img.src = currentImageUrl;
            
            // Apply current filters directly to printed images
            img.style.filter = previewImg.style.filter; 
            img.style.backgroundColor = previewImg.style.backgroundColor;
            img.style.border = previewImg.style.border;
            
            printArea.appendChild(img);
        }
        
        // Open browser print dialog
        window.print();
    });
    
    // Apply default styles on load
    applyStyles();
</script>

</body>
</html>
